name: Build DEB with Theos

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ========================
      # рџ§  жЏђеЏ–з‰€жњ¬ + еђЌз§° + еЊ…ID
      # ========================
      - name: и§ЈжћђйЎ№з›®дїЎжЃЇ
        id: meta
        run: |
          VERSION=""
          NAME=""
          PACKAGE=""

          echo "==== иЇ»еЏ– control ===="

          if [ -f "layout/DEBIAN/control" ]; then
            CONTROL="layout/DEBIAN/control"
          elif [ -f "control" ]; then
            CONTROL="control"
          fi

          if [ -n "$CONTROL" ]; then
            VERSION=$(grep "^Version:" $CONTROL | awk '{print $2}')
            PACKAGE=$(grep "^Package:" $CONTROL | awk '{print $2}')
          fi

          echo "control version: $VERSION"
          echo "control package: $PACKAGE"

          echo "==== иЇ»еЏ– Makefile ===="

          if [ -f "Makefile" ]; then
            NAME=$(grep "^TWEAK_NAME" Makefile | awk '{print $3}')
            [ -z "$VERSION" ] && VERSION=$(grep "^PACKAGE_VERSION" Makefile | awk '{print $3}')
          fi

          echo "makefile name: $NAME"

          echo "==== fallback tag ===="

          if [ -z "$VERSION" ]; then
            VERSION=$(echo $GITHUB_REF_NAME | sed 's/^v//')
          fi

          [ -z "$VERSION" ] && VERSION="0.0.1"
          [ -z "$NAME" ] && NAME="BluedHook"
          [ -z "$PACKAGE" ] && PACKAGE="com.unknown.$NAME"

          echo "жњЂз»€з‰€жњ¬: $VERSION"
          echo "жњЂз»€еђЌз§°: $NAME"
          echo "жњЂз»€еЊ…ID: $PACKAGE"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "NAME=$NAME" >> $GITHUB_ENV
          echo "PACKAGE=$PACKAGE" >> $GITHUB_ENV

      # ========================
      # рџ›  дѕќиµ–
      # ========================
      - run: |
          sudo apt update
          sudo apt install -y clang lld llvm make dpkg-dev fakeroot curl git

      - run: |
          curl -L -o /usr/local/bin/ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_linux_x86_64
          chmod +x /usr/local/bin/ldid

      # ========================
      # рџ“¦ Theos
      # ========================
      - uses: actions/cache@v4
        id: cache-theos
        with:
          path: $HOME/theos
          key: theos-cache

      - if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks-repo
          mkdir -p $HOME/theos/sdks
          cp -r $HOME/theos/sdks-repo/iPhoneOS14.5.sdk $HOME/theos/sdks/
          rm -rf $HOME/theos/sdks-repo

          mkdir -p $HOME/theos/toolchain/linux/iphone/bin
          ln -sf /usr/bin/clang $HOME/theos/toolchain/linux/iphone/bin/clang
          ln -sf /usr/bin/clang++ $HOME/theos/toolchain/linux/iphone/bin/clang++

      - run: |
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      # ========================
      # рџ”Ґ жћ„е»є rootful + rootless
      # ========================
      - name: жћ„е»є tweak
        run: |
          make clean || true

          # rootful
          make package \
            THEOS_PACKAGE_VERSION=$VERSION \
            ARCHS=arm64

          # rootless
          make package \
            THEOS_PACKAGE_VERSION=$VERSION \
            ARCHS=arm64 \
            THEOS_PACKAGE_SCHEME=rootless

          mkdir output
          find . -name "*.deb" -exec mv {} output/ \;

          if [ -z "$(ls output/*.deb 2>/dev/null)" ]; then
            echo "вќЊ жІЎжњ‰з”џж€ђ deb"
            exit 1
          fi

      # ========================
      # вњЁ зѕЋеЊ–ж–‡д»¶еђЌ
      # ========================
      - name: й‡Ќе‘ЅеђЌ DEB
        run: |
          cd output
          i=0
          for f in *.deb; do
            if [[ $f == *rootless* ]]; then
              mv "$f" "${NAME}-${VERSION}-rootless.deb"
            else
              mv "$f" "${NAME}-${VERSION}.deb"
            fi
            i=$((i+1))
          done
          echo "е…±е¤„зђ† $i дёЄ deb"

      # ========================
      # рџ“¦ ж‰“еЊ…жєђз Ѓ
      # ========================
      - run: |
          git archive --format=zip --output=output/source.zip HEAD

      # ========================
      # рџљЂ Release
      # ========================
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ${{ env.NAME }}-${{ env.VERSION }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========================
      # рџ“Ґ Artifact
      # ========================
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NAME }}-${{ env.VERSION }}
          path: output/*