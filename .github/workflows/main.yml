name: Build DEB with Theos

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ========================
      # 🧠 提取版本 + 名称 + 包ID
      # ========================
      - name: 解析项目信息
        id: meta
        run: |
          VERSION=""
          NAME=""
          PACKAGE=""

          if [ -f "layout/DEBIAN/control" ]; then
            CONTROL="layout/DEBIAN/control"
          elif [ -f "control" ]; then
            CONTROL="control"
          fi

          if [ -n "$CONTROL" ]; then
            VERSION=$(grep "^Version:" $CONTROL | awk '{print $2}')
            PACKAGE=$(grep "^Package:" $CONTROL | awk '{print $2}')
          fi

          if [ -f "Makefile" ]; then
            NAME=$(grep "^TWEAK_NAME" Makefile | awk '{print $3}')
            [ -z "$VERSION" ] && VERSION=$(grep "^PACKAGE_VERSION" Makefile | awk '{print $3}')
          fi

          if [ -z "$VERSION" ]; then
            VERSION=$(echo $GITHUB_REF_NAME | sed 's/^v//')
          fi

          [ -z "$VERSION" ] && VERSION="0.0.1"
          [ -z "$NAME" ] && NAME="BluedHook"
          [ -z "$PACKAGE" ] && PACKAGE="com.unknown.$NAME"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "NAME=$NAME" >> $GITHUB_ENV
          echo "PACKAGE=$PACKAGE" >> $GITHUB_ENV

          echo "版本: $VERSION"
          echo "名称: $NAME"
          echo "包ID: $PACKAGE"

      # ========================
      # 🛠 安装依赖
      # ========================
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y \
            clang lld llvm \
            make dpkg-dev fakeroot \
            curl git

      # ========================
      # 🔥 安装 ldid
      # ========================
      - name: 安装 ldid
        run: |
          sudo curl -L -o /usr/local/bin/ldid \
            https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_linux_x86_64
          sudo chmod +x /usr/local/bin/ldid
          ldid --version || true

      # ========================
      # 🔥 修复 linker（关键）
      # ========================
      - name: 强制使用 lld（关键修复）
        run: |
          echo "LD=/usr/bin/ld.lld" >> $GITHUB_ENV
          echo "LDFLAGS=-fuse-ld=lld" >> $GITHUB_ENV

      - name: 验证 lld
        run: |
          which ld.lld
          ld.lld --version

      # ========================
      # 📦 Theos
      # ========================
      - name: 缓存 Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: $HOME/theos
          key: theos-${{ runner.os }}

      - name: 安装 Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks-repo
          mkdir -p $HOME/theos/sdks
          cp -r $HOME/theos/sdks-repo/iPhoneOS14.5.sdk $HOME/theos/sdks/
          rm -rf $HOME/theos/sdks-repo

          mkdir -p $HOME/theos/toolchain/linux/iphone/bin
          ln -sf /usr/bin/clang $HOME/theos/toolchain/linux/iphone/bin/clang
          ln -sf /usr/bin/clang++ $HOME/theos/toolchain/linux/iphone/bin/clang++

      # ========================
      # 🌍 环境变量
      # ========================
      - name: 设置环境
        run: |
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "TARGET=iphone:clang:latest" >> $GITHUB_ENV
          echo "ARCHS=arm64" >> $GITHUB_ENV

      # ========================
      # 🔥 构建 rootful + rootless
      # ========================
      - name: 构建 tweak
        run: |
          make clean || true

          # rootful
          make package \
            THEOS_PACKAGE_VERSION=$VERSION \
            TARGET=iphone:clang:latest \
            ARCHS=arm64 \
            LD=/usr/bin/ld.lld \
            LDFLAGS="-fuse-ld=lld"

          # rootless
          make package \
            THEOS_PACKAGE_VERSION=$VERSION \
            TARGET=iphone:clang:latest \
            ARCHS=arm64 \
            THEOS_PACKAGE_SCHEME=rootless \
            LD=/usr/bin/ld.lld \
            LDFLAGS="-fuse-ld=lld"

          mkdir -p output
          find . -name "*.deb" -exec mv {} output/ \;

          if [ -z "$(ls output/*.deb 2>/dev/null)" ]; then
            echo "❌ 没有生成 deb"
            exit 1
          fi

      # ========================
      # ✨ 美化文件名
      # ========================
      - name: 重命名 DEB
        run: |
          cd output
          for f in *.deb; do
            if [[ $f == *rootless* ]]; then
              mv "$f" "${NAME}-${VERSION}-rootless.deb"
            else
              mv "$f" "${NAME}-${VERSION}.deb"
            fi
          done

      # ========================
      # 📦 打包源码
      # ========================
      - name: 打包源码
        run: |
          git archive --format=zip --output=output/source.zip HEAD

      # ========================
      # 🚀 Release
      # ========================
      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ${{ env.NAME }}-${{ env.VERSION }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========================
      # 📥 Artifacts
      # ========================
      - name: 上传 DEB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NAME }}-${{ env.VERSION }}
          path: output/*.deb

      - name: 上传源码
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NAME }}-${{ env.VERSION }}
          path: output/*.zip